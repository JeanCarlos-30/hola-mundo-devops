name:  DevOps Pipeline — Build, Push & Deploy

on:
  push:
    branches:
      - main   # Se ejecuta cada vez que haces push a main

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Construir y subir imagen a Docker Hub
  # ─────────────────────────────────────────────
  build-and-push:
    name:  Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name:  Clonar repositorio
        uses: actions/checkout@v4

      - name:  Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name:  Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name:  Extraer metadata (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/hola-mundo-app
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name:  Build y Push imagen a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 2: Desplegar en Render.com
  # ─────────────────────────────────────────────
  deploy:
    name:  Deploy a Render.com
    runs-on: ubuntu-latest
    needs: build-and-push   # Solo corre si el Job 1 fue exitoso

    steps:
      - name:  Trigger deploy en Render.com
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --silent --show-error
          echo " Deploy enviado a Render.com correctamente"